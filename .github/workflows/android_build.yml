name: Android Build

on:
  push:
    branches:
      - '**'  # Trigger on push to any branch

jobs:
  build-debug:
    # Build debug APK for all feature branches --> and not master
    if: github.ref_name != 'master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: 7.4.2 }
      - uses: nttld/setup-ndk@v1.2.0
        with: { ndk-version: r25c }
      - run: chmod +x ./gradlew

      - name: Build debug APK
        # versionCode is set to the GitHub Actions run number for traceability
        run: ./gradlew assembleDebug -PversionCode=${{ github.run_number }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: RECORDA-debug
          path: app/build/outputs/apk/debug/*.apk

  build-release:
    # Build release APK ONLY for master branch
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: 7.4.2 }
      - uses: nttld/setup-ndk@v1.2.0
        with: { ndk-version: r25c }
      - run: chmod +x ./gradlew

      - name: Decode keystore
        # Decodes the base64-encoded keystore stored as a GitHub secret
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > keystore.jks

      - name: Build & sign release APK
        # Gradle picks up signing credentials via env vars (see app/build.gradle signingConfigs)
        # versionCode is set to the GitHub Actions run number for auto-incrementing
        run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }}
        env:
          KEYSTORE_PATH: keystore.jks
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: RECORDA-release
          path: app/build/outputs/apk/release/*.apk
